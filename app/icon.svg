<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0d1220"/>

  <!-- Outer glow ring (subtle) -->
  <rect x="12" y="4"  width="8" height="2" fill="#2244ff" opacity="0.25"/>
  <rect x="12" y="26" width="8" height="2" fill="#2244ff" opacity="0.25"/>
  <rect x="4"  y="12" width="2" height="8" fill="#2244ff" opacity="0.25"/>
  <rect x="26" y="12" width="2" height="8" fill="#2244ff" opacity="0.25"/>

  <!-- Pixel cross — vertical bar -->
  <rect x="14" y="6"  width="4" height="4" fill="#2244ff"/>
  <rect x="14" y="10" width="4" height="4" fill="#4466ff"/>
  <!-- center pixel (white) -->
  <rect x="14" y="14" width="4" height="4" fill="#ffffff"/>
  <rect x="14" y="18" width="4" height="4" fill="#4466ff"/>
  <rect x="14" y="22" width="4" height="4" fill="#2244ff"/>

  <!-- Pixel cross — horizontal bar -->
  <rect x="6"  y="14" width="4" height="4" fill="#2244ff"/>
  <rect x="10" y="14" width="4" height="4" fill="#4466ff"/>
  <!-- center already drawn -->
  <rect x="18" y="14" width="4" height="4" fill="#4466ff"/>
  <rect x="22" y="14" width="4" height="4" fill="#2244ff"/>

  <!-- Corner accent dots -->
  <rect x="8"  y="8"  width="2" height="2" fill="#2244ff" opacity="0.45"/>
  <rect x="22" y="8"  width="2" height="2" fill="#2244ff" opacity="0.45"/>
  <rect x="8"  y="22" width="2" height="2" fill="#2244ff" opacity="0.45"/>
  <rect x="22" y="22" width="2" height="2" fill="#2244ff" opacity="0.45"/>
</svg>
